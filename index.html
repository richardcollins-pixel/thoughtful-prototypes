<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Thoughtful</title>
  <style>
    /* Shell-only styles — just enough to show the loading screen before config arrives */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #1F0E41; position: fixed; width: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
    body { display: flex; align-items: center; justify-content: center; }
    #phone-wrapper { width: 430px; height: 956px; transform-origin: center; }
    .phone { width: 430px; height: 956px; background: #1F0E41; border-radius: 52px; overflow: hidden; position: relative; box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 50px 120px rgba(0,0,0,0.9); }
    #app { position: absolute; inset: 0; }
    #loading { position: absolute; inset: 0; background: #1F0E41; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.4s; }
    #loading.out { opacity: 0; pointer-events: none; }
    .loading-spinner { width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.12); border-top-color: rgba(255,255,255,0.55); animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: rgba(255,255,255,0.3); font-size: 13px; }
    @media (max-width: 500px) {
      /* On mobile/PWA: fill the full screen exactly. Use 100dvh (dynamic viewport
         height) so iOS accounts for safe areas correctly. align-items:stretch
         avoids flex centering math that can leave a pixel gap. */
      html, body { height: 100dvh; }
      body { align-items: stretch; }
      #phone-wrapper { width: 100vw !important; height: 100dvh !important; transform: none !important; margin: 0 !important; }
      .phone { width: 100vw !important; height: 100dvh !important; border-radius: 0 !important; box-shadow: none !important; }
    }
  </style>
</head>
<body>
  <div id="phone-wrapper">
    <div class="phone">
      <div id="app">
        <div id="loading">
          <div class="loading-spinner"></div>
          <p class="loading-text" id="loading-text">Getting things ready…</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── The only hardcoded value: where to fetch config from ──
    const FETCH_CONFIG_URL = 'https://eopom7sc0bfe0rw.m.pipedream.net';

    // ── Scale phone container on desktop ──
    function scalePhone() {
      const s = Math.min(window.innerWidth/430, window.innerHeight/956, 1);
      const w = document.getElementById('phone-wrapper');
      w.style.transform = `scale(${s})`;
      w.style.margin = `${(956*s-956)/2}px ${(430*s-430)/2}px`;
    }
    scalePhone();
    window.addEventListener('resize', scalePhone);

    // ── Boot ──
    (async function boot() {
      let config = {};
      try {
        const res = await fetch(FETCH_CONFIG_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        config = await res.json();
        console.log('Config loaded:', {
          steps: Object.keys(config.steps || {}),
          components: Object.keys(config.components || {}),
          tokens: Object.keys(config.tokens || {}).length
        });
      } catch (e) {
        console.warn('Config fetch failed, using defaults:', e);
      }

      // 1. Apply design tokens as CSS custom properties
      for (const [k, v] of Object.entries(config.tokens || {})) {
        if (v) document.documentElement.style.setProperty(`--${k}`, v);
      }

      // 2. Store runtime vars from _config so components can read them
      config._chatUrl  = config.config_vars?.chat_endpoint || '';
      config._llmModel = config.config_vars?.llm_model     || 'us.anthropic.claude-sonnet-4-5-20250929-v1:0';

      // 3. Inject component CSS into <head>
      for (const [name, comp] of Object.entries(config.components || {})) {
        if (comp.css) {
          const style = document.createElement('style');
          style.dataset.component = name;
          style.textContent = comp.css;
          document.head.appendChild(style);
        }
      }

      // 4. Execute component JS — each registers on window.Components
      window.Components = {};
      for (const [name, comp] of Object.entries(config.components || {})) {
        if (comp.js) {
          try {
            new Function('Components', comp.js)(window.Components);
            console.log(`Component registered: ${name}`);
          } catch (e) {
            console.error(`Component ${name} failed:`, e);
          }
        }
      }

      // 5. Hide loading, render first step
      document.getElementById('loading').classList.add('out');
      setTimeout(() => document.getElementById('loading').remove(), 450);

      const steps = config.steps || {};
      const first = Object.values(steps).sort((a,b) => (a.step_number||0)-(b.step_number||0))[0];
      if (first) renderStep(first, config, steps);
      else console.error('No steps found in config');
    })();

    function showError(msg) {
      const app = document.getElementById('app');
      const e = document.createElement('div');
      e.style.cssText = 'position:absolute;inset:0;background:#1F0E41;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:12px;z-index:9999;';
      e.innerHTML = '<p style="color:rgba(255,100,100,0.9);font-size:13px;font-weight:600;text-align:center">Prototype error</p><p style="color:rgba(255,255,255,0.6);font-size:11px;text-align:center;word-break:break-all;line-height:1.5;max-width:320px">' + String(msg).replace(/</g,'&lt;') + '</p>';
      app.appendChild(e);
    }

    function renderStep(step, config, allSteps) {
      const componentName = step.component || step.type;
      const Component     = window.Components?.[componentName];
      if (!Component) {
        showError('No component: "' + componentName + '". Registered: ' + Object.keys(window.Components || {}).join(', '));
        return;
      }
      try {
        Component.render(
          document.getElementById('app'),
          step,
          config,
          allSteps,
          (nextStepId) => {
            const next = allSteps[nextStepId];
            if (next) {
              renderStep(next, config, allSteps);
            } else {
              const app = document.getElementById('app');
              const done = document.createElement('div');
              done.style.cssText = 'position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:48px;opacity:0;transition:opacity 0.4s;font-family:-apple-system,BlinkMacSystemFont,sans-serif;';
              done.innerHTML = '<p style="font-size:28px;font-weight:400;color:rgba(255,255,255,0.85);text-align:center;line-height:1.4;max-width:300px;">That\'s the end of this prototype.</p><p style="font-size:16px;color:rgba(255,255,255,0.35);text-align:center;">More steps coming soon.</p>';
              app.appendChild(done);
              requestAnimationFrame(() => { done.style.opacity = '1'; });
            }
          }
        );
      } catch(err) {
        showError(componentName + ' render error: ' + err.message);
      }
    }
  </script>
</body>
</html>
